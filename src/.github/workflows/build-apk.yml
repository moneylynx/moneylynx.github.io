name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # omogućuje ručno pokretanje s GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout koda ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. .env iz GitHub Secrets ──────────────────────────────────────────
      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      # ── 4. npm install + build ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Build web assets (Vite)
        run: npm run build

      # ── 5. Java 17 setup ───────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 6. Android SDK setup ───────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Capacitor sync ──────────────────────────────────────────────────
      - name: Capacitor sync Android
        run: npx cap sync android

      # ── 8. Keystore iz GitHub Secret ───────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/moja-lova-key.jks

      # ── 9. Gradle permissions ──────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Build signed release APK ──────────────────────────────────────
      - name: Build signed APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/moja-lova-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # ── 11. Upload APK kao artifact ────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moja-lova-v${{ github.run_number }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── 12. Notification u GitHub Summary ──────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ Moja Lova APK build uspješan!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build broj:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Datum:** $(date '+%d.%m.%Y. %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 APK je dostupan u **Artifacts** sekciji ovog builda." >> $GITHUB_STEP_SUMMARY
